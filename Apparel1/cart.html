<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Your Cart</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .cart-section {
            padding: 80px 0;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 60px;
            align-items: start;
        }

        .cart-header {
            font-size: 2.5rem;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .cart-item {
            display: flex;
            gap: 30px;
            padding: 30px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .cart-item-img {
            width: 150px;
            height: 200px;
            background: var(--bg-offwhite);
        }

        .cart-item-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cart-item-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .cart-item-title {
            font-size: 1.25rem;
            margin-bottom: 5px;
        }

        .cart-item-price {
            font-weight: 500;
            margin-bottom: auto;
        }

        .cart-item-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }

        .qty-control {
            display: flex;
            align-items: center;
            border: 1px solid var(--border-color);
        }

        .qty-btn {
            width: 40px;
            height: 40px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .qty-btn:hover {
            background: var(--bg-offwhite);
        }

        .qty-val {
            width: 40px;
            text-align: center;
            font-weight: 500;
        }

        .remove-btn {
            background: none;
            border: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: var(--text-muted);
            cursor: pointer;
            text-decoration: underline;
        }

        .remove-btn:hover {
            color: var(--accent);
        }

        /* Summary Box */
        .summary-box {
            background: var(--bg-offwhite);
            padding: 40px;
        }

        .summary-box h3 {
            font-size: 1.5rem;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .summary-total {
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: 500;
        }

        .checkout-btn {
            width: 100%;
            margin-top: 30px;
            padding: 20px;
        }

        .empty-cart {
            text-align: center;
            padding: 100px 0;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">AURA</a>
            <nav class="nav-links">
                <a href="shop.html">Shop</a>
                <a href="shop.html?cat=women">Women</a>
                <a href="shop.html?cat=men">Men</a>
            </nav>
            <div class="nav-icons">
                <a href="cart.html" class="cart-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                    <span class="cart-count" style="display: none;">0</span>
                </a>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <h1 class="cart-header">Your Bag</h1>
            
            <div class="cart-section" id="cart-section">
                <!-- Cart Content Injected by JS -->
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="copyright">
                &copy; 2026 AURA Fashion. All rights reserved.
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        function renderCart() {
            const container = document.getElementById('cart-section');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <h2>Your bag is currently empty.</h2>
                        <p style="color: var(--text-muted); margin: 20px 0 40px;">Before you proceed to checkout, you must add some products to your shopping bag.</p>
                        <a href="shop.html" class="btn">Continue Shopping</a>
                    </div>
                `;
                return;
            }

            let cartItemsHTML = '<div class="cart-items">';
            let subtotal = 0;

            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;

                cartItemsHTML += `
                    <div class="cart-item">
                        <div class="cart-item-img">
                            <img src="${item.image}" alt="${item.name}">
                        </div>
                        <div class="cart-item-info">
                            <h3 class="cart-item-title">${item.name}</h3>
                            <div style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 10px;">Size: M</div>
                            <div class="cart-item-price">$${item.price.toFixed(2)}</div>
                            
                            <div class="cart-item-actions">
                                <div class="qty-control">
                                    <button class="qty-btn" onclick="updateQty('${item.id}', -1)">-</button>
                                    <div class="qty-val">${item.quantity}</div>
                                    <button class="qty-btn" onclick="updateQty('${item.id}', 1)">+</button>
                                </div>
                                <button class="remove-btn" onclick="removeFromCart('${item.id}')">Remove</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            cartItemsHTML += '</div>';

            const tax = subtotal * 0.08;
            const total = subtotal + tax;

            const summaryHTML = `
                <div class="summary-box">
                    <h3>Order Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span>$${subtotal.toFixed(2)}</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span>Complimentary</span>
                    </div>
                    <div class="summary-row" style="color: var(--text-muted); font-size: 0.9rem;">
                        <span>Estimated Tax</span>
                        <span>$${tax.toFixed(2)}</span>
                    </div>
                    <div class="summary-row summary-total">
                        <span>Total</span>
                        <span>$${total.toFixed(2)}</span>
                    </div>
                    <button class="btn checkout-btn" onclick="alert('Proceeding to secure checkout!')">Checkout</button>
                </div>
            `;

            container.innerHTML = cartItemsHTML + summaryHTML;
        }

        // Setup global qty updater
        window.updateQty = function(productId, change) {
            const item = cart.find(i => i.id === productId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    localStorage.setItem('aura_cart', JSON.stringify(cart));
                    updateCartCount();
                    renderCart();
                }
            }
        };

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
