name: Deploy Models to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          
      - name: Build all projects
        run: |
          mkdir -p _site
          touch _site/.nojekyll
          
          for d in */; do
            d=${d%/}
            if [ "$d" = "_site" ] || [ "$d" = ".github" ] || [ "$d" = ".git" ] || [ "$d" = "skills" ] || [ "$d" = ".agents" ]; then
              continue
            fi
            
            echo "Processing $d..."
            if [ -f "$d/package.json" ]; then
              echo "Found package.json in $d, building..."
              cd "$d"
              npm install
              npm run build
              if [ -d "out" ]; then
                cp -r out ../_site/"$d"
              elif [ -d "dist" ]; then
                cp -r dist ../_site/"$d"
              else
                echo "Warning: No 'out' or 'dist' directory found after build for $d"
              fi
              cd ..
            else
              echo "No package.json in $d, copying directly..."
              cp -r "$d" _site/"$d"
            fi
          done
          
          if [ -f "index.html" ]; then
            cp index.html _site/
          fi
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'
          
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
