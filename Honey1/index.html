    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>honey-website</title>
    <script>
      // Automatically redirect to the built files when hosted on GitHub Pages
      if (window.location.hostname.includes('github.io') && !window.location.pathname.includes('/dist')) {
        window.location.replace(window.location.pathname.replace(/\/$/, '') + '/dist/');
      }
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
